router bgp 65010
   vlan-aware-bundle SO202020
      rd 65010:202020
      route-target both 37195:202020
      redistribute learned
      redistribute static
vlan 200
   name SO202020
interface Ethernet6
   switchport mode trunk
   switchport trunk allowed vlan add 200
interface Vxlan1
   vxlan vlan 200 vni 6000
router bgp 65010
   vlan-aware-bundle SO202020
      vlan add 200

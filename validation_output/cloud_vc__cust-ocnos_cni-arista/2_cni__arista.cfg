router bgp 65010
   vlan-aware-bundle SO202022
      rd 65010:202022
      route-target both 37195:202022
      redistribute learned
      redistribute static
vlan 202
   name SO202022
interface Ethernet6
   switchport mode trunk
   switchport trunk allowed vlan add 202
interface Vxlan1
   vxlan vlan 202 vni 6002
router bgp 65010
   vlan-aware-bundle SO202022
      vlan add 202

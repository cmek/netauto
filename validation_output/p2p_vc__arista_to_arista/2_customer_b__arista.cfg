router bgp 65002
   vlan-aware-bundle SO101010
      rd 65002:101010
      route-target both 37195:101010
      redistribute learned
      redistribute static
vlan 100
   name SO101010
interface Ethernet6
   switchport mode trunk
   switchport trunk allowed vlan add 100
interface Vxlan1
   vxlan vlan 100 vni 5000
router bgp 65002
   vlan-aware-bundle SO101010
      vlan add 100

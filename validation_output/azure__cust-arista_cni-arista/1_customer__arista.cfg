router bgp 65001
   vlan-aware-bundle SO303030
      rd 65001:303030
      route-target both 37186:303030
      redistribute learned
      redistribute static
vlan 700
   name SO303030
interface Ethernet6
   switchport mode trunk
   switchport trunk allowed vlan add 700
   switchport vlan translation 10 dot1q-tunnel 700
   switchport vlan translation 20 dot1q-tunnel 700
   switchport vlan translation 30 dot1q-tunnel 700
interface Vxlan1
   vxlan vlan 700 vni 7000
router bgp 65001
   vlan-aware-bundle SO303030
      vlan add 700

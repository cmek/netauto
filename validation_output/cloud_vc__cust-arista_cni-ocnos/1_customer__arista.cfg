router bgp 65001
   vlan-aware-bundle SO202021
      rd 65001:202021
      route-target both 37195:202021
      redistribute learned
      redistribute static
vlan 201
   name SO202021
interface Ethernet6
   switchport mode trunk
   switchport trunk allowed vlan add 201
interface Vxlan1
   vxlan vlan 201 vni 6001
router bgp 65001
   vlan-aware-bundle SO202021
      vlan add 201

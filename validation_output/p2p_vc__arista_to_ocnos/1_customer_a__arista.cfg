router bgp 65001
   vlan-aware-bundle SO101012
      rd 65001:101012
      route-target both 37195:101012
      redistribute learned
      redistribute static
vlan 102
   name SO101012
interface Ethernet6
   switchport mode trunk
   switchport trunk allowed vlan add 102
interface Vxlan1
   vxlan vlan 102 vni 5002
router bgp 65001
   vlan-aware-bundle SO101012
      vlan add 102
